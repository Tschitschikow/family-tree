<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eintrag – Bahrs Familienstammbaum</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Georgia, serif;
            background: #fdf8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #5a3e2b;
            color: white;
            padding: 0.8em 2em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 1.2em; }
        header nav a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            margin-left: 1.5em;
            font-size: 0.95em;
        }
        header nav a:hover { color: white; }
        #logout-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 0.4em 1em;
            border-radius: 5px;
            cursor: pointer;
            font-family: Georgia, serif;
        }
        main {
            max-width: 700px;
            margin: 2em auto;
            padding: 0 1em;
            width: 100%;
        }
        h2 {
            color: #5a3e2b;
            font-size: 1.3em;
            margin-bottom: 1em;
            padding-bottom: 0.4em;
            border-bottom: 2px solid #e0d0c0;
        }
        h3 {
            color: #7a5e4b;
            font-size: 1em;
            margin: 1.2em 0 0.8em 0;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 1.8em;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 2em;
        }
        .field { margin-bottom: 1em; }
        label {
            display: block;
            font-size: 0.85em;
            color: #5a3e2b;
            margin-bottom: 0.3em;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 0.6em 0.8em;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
            font-family: Georgia, serif;
            background: #fafafa;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #5a3e2b;
            background: white;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1em;
        }
        .rel-block {
            background: #fdf6ee;
            border: 1px solid #e8d8c8;
            border-radius: 7px;
            padding: 1em;
            margin-bottom: 0.8em;
        }
        .rel-block .row { grid-template-columns: 1fr 1fr; }
        .submit-btn {
            width: 100%;
            padding: 0.8em;
            background: #5a3e2b;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            font-family: Georgia, serif;
            margin-top: 0.5em;
        }
        .submit-btn:hover { background: #7a5e4b; }
        .add-rel-btn {
            background: none;
            border: 1px dashed #5a3e2b;
            color: #5a3e2b;
            border-radius: 5px;
            padding: 0.5em 1em;
            cursor: pointer;
            font-family: Georgia, serif;
            font-size: 0.9em;
            margin-bottom: 1em;
            width: 100%;
        }
        .add-rel-btn:hover { background: #f0e8dc; }
        .remove-rel-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1.1em;
            float: right;
            margin-top: -0.2em;
        }
        .remove-rel-btn:hover { color: #c0392b; }
        .message {
            margin-top: 1em;
            padding: 0.8em;
            border-radius: 5px;
            font-size: 0.9em;
            display: none;
        }
        .message.success {
            background: #eafaf1;
            color: #1e8449;
            border: 1px solid #a9dfbf;
            display: block;
        }
        .message.error {
            background: #fdedec;
            color: #c0392b;
            border: 1px solid #f1948a;
            display: block;
        }
        .hint { font-size: 0.8em; color: #aaa; margin-top: 0.2em; }
        .divider {
            border: none;
            border-top: 1px dashed #e0d0c0;
            margin: 1.2em 0;
        }
    </style>
</head>
<body>

<header>
    <h1>🌳 Bahrs Familienstammbaum</h1>
    <nav>
        <a href="stammbaum.html">← Zum Stammbaum</a>
    </nav>
    <button id="logout-btn">Ausloggen</button>
</header>

<main>
    <div class="card">
        <h2>👤 Neue Person + Beziehungen eintragen</h2>

        <!-- Personendaten -->
        <div class="row">
            <div class="field">
                <label>Familienname *</label>
                <input type="text" id="p-family" placeholder="z.B. BAHRS" />
            </div>
            <div class="field">
                <label>Vorname *</label>
                <input type="text" id="p-given" placeholder="z.B. Johann" />
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label>Geschlecht *</label>
                <select id="p-sex">
                    <option value="">– bitte wählen –</option>
                    <option value="m">männlich</option>
                    <option value="f">weiblich</option>
                </select>
            </div>
            <div class="field">
                <label>Mädchenname</label>
                <input type="text" id="p-maiden" placeholder="nur bei verheirateten Frauen" />
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label>Geburtsdatum</label>
                <input type="date" id="p-birth" />
                <div class="hint">Leer lassen wenn unbekannt</div>
            </div>
            <div class="field">
                <label>Sterbedatum</label>
                <input type="date" id="p-death" />
                <div class="hint">Leer lassen wenn unbekannt</div>
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label>Geburtsort</label>
                <input type="text" id="p-birthplace" placeholder="z.B. Lütjenburg" />
            </div>
            <div class="field">
                <label>Sterbeort</label>
                <input type="text" id="p-deathplace" placeholder="z.B. Hamburg" />
            </div>
        </div>
        <div class="field">
            <label>Beruf</label>
            <input type="text" id="p-profession" placeholder="z.B. Holländer, Bauer" />
        </div>

        <hr class="divider">

        <!-- Beziehungen -->
        <h3>🔗 Beziehungen zur neuen Person (optional)</h3>
        <div id="rel-container"></div>
        <button class="add-rel-btn" id="add-rel-btn">+ Beziehung hinzufügen</button>

        <button class="submit-btn" id="btn-submit">
            Alles eintragen (zur Freigabe)
        </button>
        <div class="message" id="msg-main"></div>
    </div>
</main>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
window.addEventListener('load', function() {

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;
    let allPersons  = [];
    let relCount    = 0;

    // Zugangsschutz
    client.auth.getSession().then(function(result) {
        if (!result.data.session) {
            window.location.href = 'login.html';
        } else {
            currentUser = result.data.session.user;
            loadPersons();
        }
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', function() {
        client.auth.signOut().then(function() {
            window.location.href = 'login.html';
        });
    });

    // Alle approved Personen für Dropdowns laden
    function loadPersons() {
        client.from('persons')
            .select('id, display_name, family_name')
            .eq('status', 'approved')
            .order('family_name')
            .then(function(result) {
                if (result.error) return;
                allPersons = result.data;
            });
    }

    // Beziehungsblock hinzufügen
    document.getElementById('add-rel-btn').addEventListener('click', function() {
        addRelBlock();
    });

    function addRelBlock() {
        relCount++;
        var id = relCount;
        var div = document.createElement('div');
        div.className = 'rel-block';
        div.id = 'rel-block-' + id;

        // Personen-Optionen aufbauen
        var options = '<option value="">– Person wählen –</option>';
        allPersons.forEach(function(p) {
            options += '<option value="' + p.id + '">' +
                       p.display_name + ' (ID: ' + p.id + ')</option>';
        });

        div.innerHTML =
            '<button class="remove-rel-btn" onclick="removeRel(' + id + ')">✕</button>' +
            '<div class="row">' +
              '<div class="field">' +
                '<label>Neue Person ist...</label>' +
                '<select id="r-type-' + id + '">' +
                  '<option value="">– Beziehungstyp –</option>' +
                  '<option value="hasMother">Mutter von...</option>' +
                  '<option value="hasFather">Vater von...</option>' +
                  '<option value="hasWife">Ehefrau von...</option>' +
                  '<option value="hasHusband">Ehemann von...</option>' +
                  '<option value="isMother">...hat diese Mutter</option>' +
                  '<option value="isFather">...hat diesen Vater</option>' +
                  '<option value="isWife">...ist verheiratet mit (w)</option>' +
                  '<option value="isHusband">...ist verheiratet mit (m)</option>' +
                '</select>' +
              '</div>' +
              '<div class="field">' +
                '<label>Verbunden mit</label>' +
                '<select id="r-related-' + id + '">' + options + '</select>' +
              '</div>' +
            '</div>';

        document.getElementById('rel-container').appendChild(div);
    }

    // Beziehungsblock entfernen
    window.removeRel = function(id) {
        var el = document.getElementById('rel-block-' + id);
        if (el) el.remove();
    };

    // Alles absenden
    document.getElementById('btn-submit').addEventListener('click', function() {
        var familyName = document.getElementById('p-family').value.trim().toUpperCase();
        var givenName  = document.getElementById('p-given').value.trim();
        var sex        = document.getElementById('p-sex').value;
        var msg        = document.getElementById('msg-main');

        if (!familyName || !givenName || !sex) {
            showMsg(msg, 'error', 'Bitte Familienname, Vorname und Geschlecht ausfüllen.');
            return;
        }

        // Kein id, kein display_name – beides setzt die Datenbank automatisch
        var newPerson = {
            family_name:  familyName,
            given_name:   givenName,
            sex:          sex,
            maiden_name:  document.getElementById('p-maiden').value.trim()     || null,
            birth_date:   document.getElementById('p-birth').value             || null,
            death_date:   document.getElementById('p-death').value             || null,
            birth_place:  document.getElementById('p-birthplace').value.trim() || null,
            death_place:  document.getElementById('p-deathplace').value.trim() || null,
            profession:   document.getElementById('p-profession').value.trim() || null,
            status:       'pending',
        };

        // Erst Person speichern, dann Beziehungen
        client.from('persons').insert([newPerson]).select().then(function(result) {
            if (result.error) {
                showMsg(msg, 'error', 'Fehler beim Speichern: ' + result.error.message);
                return;
            }

            var savedPerson = result.data[0];
            logChange('INSERT', 'persons', savedPerson.id, newPerson);

            // Beziehungen sammeln
            var rels = collectRelationships(savedPerson.id);

            if (rels.length === 0) {
                showSuccess(msg, savedPerson.display_name, 0);
                clearForm();
                return;
            }

            // Beziehungen speichern
            client.from('relationships').insert(rels).select().then(function(relResult) {
                if (relResult.error) {
                    showMsg(msg, 'error',
                        'Person gespeichert, aber Fehler bei Beziehungen: ' +
                        relResult.error.message);
                    return;
                }
                relResult.data.forEach(function(r) {
                    logChange('INSERT', 'relationships', r.id, r);
                });
                showSuccess(msg, savedPerson.display_name, rels.length);
                clearForm();
            });
        });
    });

    // Beziehungen aus den Blöcken auslesen
    function collectRelationships(newPersonId) {
        var rels = [];
        var blocks = document.querySelectorAll('.rel-block');
        blocks.forEach(function(block) {
            var blockId   = block.id.replace('rel-block-', '');
            var relType   = document.getElementById('r-type-'    + blockId).value;
            var relatedId = parseInt(document.getElementById('r-related-' + blockId).value);

            if (!relType || !relatedId) return;

            var personId, relatedPersonId, type;

            if (relType === 'hasMother' || relType === 'hasFather') {
                // Neue Person IST Mutter/Vater von relatedId
                personId        = relatedId;
                relatedPersonId = newPersonId;
                type            = relType;
            } else if (relType === 'isMother' || relType === 'isFather') {
                // Neue Person HAT diese Mutter/diesen Vater
                personId        = newPersonId;
                relatedPersonId = relatedId;
                type            = relType === 'isMother' ? 'hasMother' : 'hasFather';
            } else if (relType === 'hasWife' || relType === 'isWife') {
                personId        = newPersonId;
                relatedPersonId = relatedId;
                type            = 'hasWife';
            } else if (relType === 'hasHusband' || relType === 'isHusband') {
                personId        = newPersonId;
                relatedPersonId = relatedId;
                type            = 'hasHusband';
            }

            // Kein id – wird automatisch von der Datenbank vergeben
            rels.push({
                person_id:         personId,
                related_person_id: relatedPersonId,
                relationship_type: type,
                status:            'pending',
            });
        });
        return rels;
    }

    // Changelog
    function logChange(action, tableName, recordId, details) {
        client.from('changelog').insert([{
            changed_by: currentUser.email,
            action:     action,
            table_name: tableName,
            record_id:  String(recordId),
            details:    details,
        }]).then(function() {});
    }

    function showSuccess(msg, name, relCount) {
        var relText = relCount > 0
            ? ' mit ' + relCount + ' Beziehung(en)'
            : ' (ohne Beziehungen)';
        showMsg(msg, 'success',
            '✓ ' + name + relText + ' eingetragen – wartet auf Freigabe.');
    }

    function showMsg(el, type, text) {
        el.className = 'message ' + type;
        el.textContent = text;
    }

    function clearForm() {
        ['p-family','p-given','p-maiden','p-birth','p-death',
         'p-birthplace','p-deathplace','p-profession'].forEach(function(id) {
            document.getElementById(id).value = '';
        });
        document.getElementById('p-sex').value = '';
        document.getElementById('rel-container').innerHTML = '';
        relCount = 0;
    }

});
</script>
</body>
</html>
