<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stammbaum – Bahrs Familie</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #f8f8f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header: hell grau ── */
        header {
            background: #ffffff;
            color: #222;
            padding: 0.7em 2em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            border-bottom: 1px solid #e0e0e0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        header h1 { font-size: 1.1em; font-weight: 400; color: #444; letter-spacing: 0.02em; }
        header nav a {
            color: #666;
            font-size: 0.88em;
            text-decoration: none;
        }
        header nav a:hover { color: #222; }

        #logout-btn {
            background: white;
            border: 1px solid #ddd;
            color: #555;
            padding: 0.35em 0.9em;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            font-family: inherit;
        }
        #logout-btn:hover { background: #f0f0f0; border-color: #bbb; }

        /* ── Toolbar: sehr hell ── */
        #toolbar {
            background: #ffffff;
            border-bottom: 1px solid #e8e8e8;
            padding: 0.5em 1.5em;
            display: flex;
            align-items: center;
            gap: 0.8em;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        #toolbar label { font-size: 0.82em; color: #888; }
        #filter-name {
            padding: 0.35em 0.7em;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.88em;
            font-family: inherit;
            width: 180px;
            background: #fafafa;
            color: #333;
        }
        #filter-name:focus { outline: none; border-color: #aaa; background: white; }
        #layout-select {
            padding: 0.35em 0.7em;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.88em;
            font-family: inherit;
            background: #fafafa;
            color: #333;
        }
        .tool-btn {
            padding: 0.35em 0.8em;
            background: #f0f0f0;
            color: #444;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.82em;
            font-family: inherit;
        }
        .tool-btn:hover { background: #e4e4e4; border-color: #bbb; color: #222; }
        #person-count { font-size: 0.8em; color: #bbb; margin-left: auto; }

        /* ── Graph-Container ── */
        #graph-wrap {
            flex: 1;
            min-height: 0;
            position: relative;
            display: flex;
        }

        /* ── Zeitachse ── */
        #timeline {
            width: 52px;
            flex-shrink: 0;
            position: relative;
            background: #fafafa;
            border-right: 1px solid #ebebeb;
            overflow: hidden;
            pointer-events: none;
        }
        .tl-label {
            position: absolute;
            right: 6px;
            font-size: 0.65em;
            color: #bbb;
            font-family: inherit;
            transform: translateY(-50%);
            white-space: nowrap;
            letter-spacing: 0.02em;
        }
        .tl-line {
            position: absolute;
            left: 0; right: 0;
            height: 1px;
            background: #ebebeb;
        }
        .tl-band {
            position: absolute;
            left: 0; right: 0;
            pointer-events: none;
        }

        #cy {
            background: transparent !important;
            min-height: 500px;
        }

        #cy-wrapper {
            background-color: #f8f8f8;
            flex: 1;
            min-height: 0;
        }
        #tl-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        /* ── Legende ── */
        #legend {
            position: fixed;
            bottom: 20px; left: 20px;
            background: rgba(255,255,255,0.97);
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 0.6em 0.9em;
            font-size: 0.72em;
            z-index: 100;
            max-height: 55vh;
            overflow-y: auto;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            min-width: 150px;
        }
        #legend h4 {
            color: #888;
            margin-bottom: 0.4em;
            font-size: 0.88em;
            font-weight: 500;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 0.3em;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .legend-item {
            display: flex; align-items: center; margin-bottom: 0.25em;
            gap: 0.5em; cursor: pointer; padding: 0.1em 0.2em; border-radius: 3px;
        }
        .legend-item:hover { background: #f5f5f5; }
        .legend-dot {
            width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .legend-hint { font-size: 0.78em; color: #ccc; margin-top: 0.4em; font-style: italic; }

        /* ── Info-Panel ── */
        #info-panel {
            display: none;
            position: fixed; top: 70px; right: 20px;
            width: 260px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.10);
            border: 1px solid #ebebeb;
            padding: 1.1em;
            z-index: 1000;
            font-size: 0.88em;
        }
        #info-panel h2 {
            font-size: 1em; color: #222;
            margin-bottom: 0.7em;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 0.4em;
            font-weight: 600;
        }
        #info-panel .field { margin-bottom: 0.35em; color: #999; font-size: 0.9em; }
        #info-panel .field span { color: #333; font-weight: 500; }
        #info-close {
            position: absolute; top: 0.5em; right: 0.7em;
            cursor: pointer; font-size: 1.1em; color: #ccc;
            background: none; border: none;
        }
        #info-close:hover { color: #888; }

        /* ── Pfadsuche Panel ── */
        #path-panel {
            display: none;
            background: #ffffff;
            border-bottom: 1px solid #e8e8e8;
            padding: 0.6em 1.5em;
            gap: 1em;
            align-items: center;
            flex-wrap: wrap;
        }
        #path-panel.open { display: flex; }
        #path-panel label { font-size: 0.82em; color: #888; }
        #path-panel select {
            padding: 0.35em 0.7em;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.85em;
            font-family: inherit;
            width: 200px;
            background: #fafafa;
            color: #333;
        }
        #path-result {
            font-size: 0.82em;
            color: #888;
            font-style: italic;
            margin-left: 0.5em;
        }

        /* ── Abstoßungs-Schieberegler ── */
        input[type=range] { accent-color: #aaa; }

        #status-bar { text-align: center; padding: 2em; color: #bbb; font-size: 1em; }
    </style>
</head>
<body>

<header>
    <h1>🌳 Bahrs Familienstammbaum</h1>
    <nav style="display:flex; gap:1em; align-items:center;">
        <!-- 3D-Ansicht ausgeblendet
        <a href="stammbaum3d.html"
           style="color:rgba(255,255,255,0.85); font-size:0.9em; text-decoration:none;">

        </a>
        <a href="admin.html" id="admin-btn"
           style="display:none; color:white; font-size:0.85em; text-decoration:none;

<div id="toolbar">
    <label>🔍 Filter:</label>
    <input type="text" id="filter-name" placeholder="Familienname..." />
    <label>Layout:</label>
    <select id="layout-select">
        <option value="timeline">Zeitachse + Organisch</option>
        <option value="cose">Organisch</option>
        <!-- <option value="klay">Stammbaum (klay)</option> -->
        <!-- <option value="dagre">Hierarchisch (dagre)</option> -->
        <!-- <option value="breadthfirst">Breitensuche</option> -->
        <option value="circle">Kreis</option>
        <!-- <option value="grid">Raster</option> -->
    </select>
    <button class="tool-btn" id="apply-layout">Neu anordnen</button>
    <button class="tool-btn" id="reset-filter">Alle zeigen</button>
    <label style="font-size:0.82em; display:flex; align-items:center; gap:4px;">
        <input type="checkbox" id="show-parent" checked style="width:auto;">
        Eltern-Kind
    </label>
    <label style="font-size:0.82em; display:flex; align-items:center; gap:4px;">
        <input type="checkbox" id="show-married" checked style="width:auto;">
        Verheiratet
    </label>
    <label style="font-size:0.82em; display:flex; align-items:center; gap:4px;">
        <input type="checkbox" id="show-siblings" checked style="width:auto;">
        Geschwister
    </label>

    <span id="person-count"></span>
    <button class="tool-btn" id="path-toggle">🔍 Pfad suchen</button>
</div>

<!-- Pfadsuche Panel -->
<div id="path-panel">
    <label>Person A:</label>
    <select id="path-person-a"><option value="">– Person wählen –</option></select>
    <label>Person B:</label>
    <select id="path-person-b"><option value="">– Person wählen –</option></select>
    <label>Max. Schritte:</label>
    <select id="path-max-steps" style="width:80px;">
        <option value="4">4</option>
        <option value="6" selected>6</option>
        <option value="8">8</option>
        <option value="10">10</option>
    </select>
    <button class="tool-btn" id="path-search-btn">Suchen</button>
    <button class="tool-btn" id="path-reset-btn" style="background:#888;">Zurücksetzen</button>
    <span id="path-result"></span>
</div>

<div id="status-bar">Lade Stammbaum...</div>

<div id="graph-wrap">
    <div id="timeline"></div>
    <div id="cy-wrapper" style="position:relative; flex:1; min-height:0; min-width:0;">
        <svg id="tl-svg" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></svg>
        <div id="cy" style="position:absolute; top:0; left:0; right:0; bottom:0;"></div>
    </div>
</div>

<div id="legend">
    <h4>🎨 Familiennamen</h4>
    <div id="legend-items"></div>
    <div class="legend-hint">Klick → nur diese Familie</div>
</div>

<div id="info-panel">
    <button id="info-close">✕</button>
    <h2 id="info-name"></h2>
    <div class="field">Geschlecht: <span id="info-sex"></span></div>
    <div class="field">Geboren: <span id="info-birth"></span></div>
    <div class="field">Gestorben: <span id="info-death"></span></div>
    <div class="field">Geburtsort: <span id="info-birthplace"></span></div>
    <div class="field">Sterbeort: <span id="info-deathplace"></span></div>
    <div class="field">Beruf: <span id="info-profession"></span></div>
    <div class="field">Mädchenname: <span id="info-maiden"></span></div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<script src="https://cdn.jsdelivr.net/npm/klayjs@0.4.1/klay.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-klay@3.1.4/cytoscape-klay.js"></script>

<script>
var FAMILY_COLORS = {
    'ALLERHOLZ': '#f5caca',
    'APPEL': '#f5d3ca',
    'BAHRS': '#f5dbca',
    'BERG': '#f5e3ca',
    'DAVIDS': '#f5ecca',
    'DEPNER': '#f5f4ca',
    'FRANCK': '#eef5ca',
    'FRANSSEN': '#e6f5ca',
    'GAVRIKOV': '#def5ca',
    'GAVRIKOVA': '#d6f5ca',
    'GLASHOFF': '#cdf5ca',
    'GROTH': '#caf5d0',
    'HEIDEMANN': '#caf5d8',
    'HEINRICHS': '#caf5e1',
    'KARSTENS': '#caf5e9',
    'KÜHL': '#caf5f1',
    'MARTENS': '#caf1f5',
    'MEYER': '#cae9f5',
    'MÖLLER': '#cae1f5',
    'PETERS': '#cad8f5',
    'RISCHE': '#cad0f5',
    'RÜHMANN': '#cdcaf5',
    'RÜHTER': '#d6caf5',
    'SCHMIDT': '#decaf5',
    'SCHNAAK': '#e6caf5',
    'SCHUBERT': '#eecaf5',
    'STEINKAMP': '#f5caf4',
    'TEGTMEYER': '#f5caec',
    'UHLMANN': '#f5cae3',
    'ULMER': '#f5cadb',
    'WIPPERMANN': '#f5cad3',
};
function getFamilyColor(n) { return FAMILY_COLORS[n] || '#cccccc'; }

// Pixel pro Jahr in der Zeitachsen-Ansicht
var PX_PER_YEAR = 8;
var TL_MIN_YEAR = 1660;   // wird von applyTimelineLayout gesetzt
var TL_MAX_YEAR = 2025;
var TL_PADDING  = 100;

window.addEventListener('load', function() {

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let cy         = null;
    let allPersons = [];
    let allRels    = [];
    let showParent  = true;
    let showMarried = true;
    let showSiblings = true;
    var repulsionValue = 10000000;

    var ADMIN_EMAIL = 'hannes.bahrs@de.bosch.com';

    client.auth.getSession().then(function(result) {
        if (!result.data.session) { window.location.href = 'login.html'; }
        else {
            if (result.data.session.user.email === ADMIN_EMAIL) {
                document.getElementById('admin-btn').style.display = 'inline-block';
            }
            loadData();
        }
    });

    document.getElementById('logout-btn').addEventListener('click', function() {
        client.auth.signOut().then(function() { window.location.href = 'login.html'; });
    });

    function loadData() {
        Promise.all([
            client.from('persons').select('*').eq('status', 'approved'),
            client.from('relationships').select('*').eq('status', 'approved'),
        ]).then(function(results) {
            if (results[0].error || results[1].error) {
                document.getElementById('status-bar').textContent = 'Fehler beim Laden.';
                return;
            }
            allPersons = results[0].data.map(function(p) { p.id = Number(p.id); return p; });
            allRels    = results[1].data.map(function(r) {
                r.id = Number(r.id);
                r.person_id = Number(r.person_id);
                r.related_person_id = Number(r.related_person_id);
                return r;
            });
            document.getElementById('status-bar').style.display = 'none';
            buildLegend(allPersons);
            initCy();
            applyFilter(allPersons, allRels);
            fillPathDropdowns();
        });
    }

    function initCy() {
        cy = cytoscape({
            container: document.getElementById('cy'),
            elements:  [],
            style: [
                {
                    selector: 'node',
                    style: {
                        'label':            'data(label)',
                        'font-size':        '8px',
                        'font-family':      'Helvetica Neue, Arial, sans-serif',
                        'text-valign':      'center',
                        'text-halign':      'center',
                        'text-wrap':        'wrap',
                        'text-max-width':   '75px',
                        'width':            'data(nodeW)',
                        'height':           'data(nodeH)',
                        'shape':            'ellipse',
                        'background-color': 'data(famColor)',
                        'border-width':     '0.5px',
                        'border-color':     'rgba(0,0,0,0.18)',
                        'color':            '#444',
                    }
                },
                { selector: 'node[sex = "f"]', style: {
                    'shape': 'ellipse',
                    'border-style': 'solid',
                }},
                { selector: 'node[sex = "m"]', style: {
                    'shape':        'rectangle',
                    'border-style': 'solid',
                    'corner-radius':'3px',
                }},
                {
                    selector: 'node.married',
                    style: { 'border-color': '#d4a820', 'border-width': '0.5px' }
                },
                { selector: 'node:selected', style: { 'border-width': '2px', 'border-color': '#666', 'border-style': 'solid' } },
                {
                    selector: 'edge',
                    style: {
                        'width': 1, 'line-color': '#ccc',
                        'target-arrow-color': '#ccc', 'target-arrow-shape': 'triangle',
                        'curve-style': 'bezier',
                        'font-size': '7px', 'font-family': 'Helvetica Neue, Arial, sans-serif',
                        'text-rotation': 'autorotate', 'text-margin-y': '-8px',
                        'color': '#aaa', 'label': '',
                    }
                },
                { selector: 'edge[type = "hasMother"]', style: { 'line-color': '#e8a0b0', 'target-arrow-color': '#e8a0b0', 'color': '#e8a0b0', 'width': 1 } },
                { selector: 'edge[type = "hasFather"]', style: { 'line-color': '#a0c0e0', 'target-arrow-color': '#a0c0e0', 'color': '#a0c0e0', 'width': 1 } },
                {
                    selector: 'edge[type = "hasWife"]',
                    style: {
                        'line-color': '#e8c84a', 'target-arrow-shape': 'none',
                        'line-style': 'solid', 'width': 3.5, 'opacity': 0.7, 'color': '#e8c84a',
                    }
                },
                {
                    selector: 'edge[type = "sibling"]',
                    style: {
                        'line-color': '#6abf69',
                        'source-arrow-shape': 'none',
                        'source-arrow-color': '#6abf69',
                        'target-arrow-shape': 'none',
                        'target-arrow-color': '#6abf69',
                        'line-style': 'solid',
                        'width': 1,
                        'opacity': 0.7,
                        'color': '#6abf69',
                        'curve-style': 'bezier',
                        'font-size': '7px',
                        'font-family': 'Helvetica Neue, Arial, sans-serif',
                        'text-rotation': 'autorotate',
                        'text-margin-y': '-8px',
                        'label': '',
                    }
                },
                { selector: '.faded', style: { 'opacity': 0.08 } }
            ],
        });

        // Zeitachse beim Zoomen/Panen mitbewegen
        cy.on('viewport', function() {
            if (document.getElementById('layout-select').value === 'timeline') {
                updateTimeline();
            }
        });

        cy.on('tap', 'node', function(e) {
            var node = e.target, d = node.data();
            document.getElementById('info-name').textContent       = d.label.split('\n')[0].replace(' †','').replace(' *','').trim();
            document.getElementById('info-sex').textContent        = d.sex === 'm' ? 'männlich' : d.sex === 'f' ? 'weiblich' : '–';
            document.getElementById('info-birth').textContent      = (formatDate(d.birth_date) || '–') + (d.birth_date_estimated ? ' 🔮 geschätzt' : '');
            document.getElementById('info-death').textContent      = (formatDate(d.death_date) || '–') + (d.death_date_estimated ? ' 🔮 geschätzt' : '');
            document.getElementById('info-birthplace').textContent = d.birth_place  || '–';
            document.getElementById('info-deathplace').textContent = d.death_place  || '–';
            document.getElementById('info-profession').textContent = d.profession   || '–';
            document.getElementById('info-maiden').textContent     = d.maiden_name  || '–';
            document.getElementById('info-panel').style.display    = 'block';
            cy.elements().addClass('faded');
            node.removeClass('faded');
            node.connectedEdges().removeClass('faded');
            node.connectedEdges().connectedNodes().removeClass('faded');
        });
        cy.on('tap', function(e) {
            if (e.target === cy) {
                cy.elements().removeClass('faded');
                document.getElementById('info-panel').style.display = 'none';
            }
        });
        document.getElementById('info-close').addEventListener('click', function() {
            cy.elements().removeClass('faded');
            document.getElementById('info-panel').style.display = 'none';
        });

        // ── Nur vertikales Verschieben im Zeitachsen-Layout ──────
        // Ansatz: X-Position beim Grab merken, bei jedem position-Event zurücksetzen
        var _lockedY = null;
        var _isDragging = false;

        cy.on('grabon', 'node', function(e) {
            if (document.getElementById('layout-select').value === 'timeline') {
                _lockedY    = e.target.position('y');
                _isDragging = true;
            }
        });

        cy.on('free', 'node', function(e) {
            if (_isDragging && _lockedY !== null) {
                e.target.position('y', _lockedY);
            }
            _isDragging = false;
            _lockedY    = null;
        });

        cy.on('drag', 'node', function(e) {
            if (_isDragging && _lockedY !== null) {
                e.target.position('y', _lockedY);
            }
        });
    }

    function applyFilter(persons, relationships) {
        cy.elements().remove();
        cy.add(buildElements(persons, relationships));
        updateCount(persons.length);
        runLayout(document.getElementById('layout-select').value);
    }

    function buildElements(persons, relationships) {
        var birthYears = persons
            .map(function(p) { return p.birth_date ? parseInt(p.birth_date.substring(0,4)) : null; })
            .filter(function(y) { return y !== null; });
        var minYear = birthYears.length ? Math.min.apply(null, birthYears) : 1660;
        var maxYear = birthYears.length ? Math.max.apply(null, birthYears) : 2025;
        var avgYear = birthYears.length ? Math.round(
            birthYears.reduce(function(a,b){return a+b;},0) / birthYears.length) : 1850;

        function calcNodeSize(birth_date) {
            // Älteste Person: 150x75, Jüngste: 50x25, linear dazwischen
            var year  = birth_date ? parseInt(birth_date.substring(0,4)) : avgYear;
            var ratio = (maxYear - minYear) > 0 ? (maxYear - year) / (maxYear - minYear) : 0.5;
            // ratio=1 → älteste Person (großer Knoten), ratio=0 → jüngste (kleiner Knoten)
            var w = Math.round(50  + ratio * 100);  // 50..150
            var h = Math.round(25  + ratio * 50);   // 25..75
            return { w: w, h: h };
        }

        var personIds = new Set(persons.map(function(p) { return p.id; }));
        var marriedIds = new Set();
        relationships.forEach(function(r) {
            if ((r.relationship_type === 'hasWife' || r.relationship_type === 'hasHusband') &&
                personIds.has(r.person_id) && personIds.has(r.related_person_id)) {
                marriedIds.add(r.person_id);
                marriedIds.add(r.related_person_id);
            }
        });

        var elements = [];
        persons.forEach(function(p) {
            var sz = calcNodeSize(p.birth_date);
            // Geburtsjahr für spätere Y-Positionierung im data speichern
            var birthYear = p.birth_date ? parseInt(p.birth_date.substring(0,4)) : avgYear;
            // Label aufbauen: Name [† *] + Mädchenname
            // Symbole direkt hinter dem Namen in Zeile 1, klar getrennt
            var nameLine = p.display_name;
            var symbols = '';
            if (p.death_date)                                        symbols += ' †';
            if (p.birth_date_estimated || p.death_date_estimated)    symbols += ' *';
            nameLine = nameLine + symbols;

            // Mädchenname als zweite Zeile
            var label = nameLine;
            if (p.maiden_name) {
                label = nameLine + '\nGeb. ' + p.maiden_name;
            }
            elements.push({ group: 'nodes', data: {
                id:          p.id,
                label:       label,
                sex:         p.sex,
                family_name: p.family_name,
                birth_date:  p.birth_date  || '',
                death_date:  p.death_date  || '',
                birth_place: p.birth_place || '',
                death_place: p.death_place || '',
                profession:  p.profession  || '',
                maiden_name: p.maiden_name || '',
                nodeW:       sz.w,
                nodeH:       sz.h,
                famColor:    getFamilyColor(p.family_name),
                birthYear:   birthYear,
                birth_date_estimated: p.birth_date_estimated || false,
                death_date_estimated: p.death_date_estimated || false,
            },
            classes: marriedIds.has(p.id) ? 'married' : '',
            });
        });

        relationships.forEach(function(r) {
            if (!personIds.has(r.person_id) || !personIds.has(r.related_person_id)) return;
            if (r.relationship_type === 'hasMother' || r.relationship_type === 'hasFather') {
                elements.push({ group: 'edges', data: {
                    id: 'e'+r.id, source: r.related_person_id, target: r.person_id,
                    type: r.relationship_type,
                    label: r.relationship_type === 'hasMother' ? 'ist Mutter von' : 'ist Vater von',
                }});
            }
            if (r.relationship_type === 'hasWife') {
                elements.push({ group: 'edges', data: {
                    id: 'e'+r.id, source: r.person_id, target: r.related_person_id,
                    type: r.relationship_type, label: 'sind verheiratet',
                }});
            }
        });

        // ── Geschwister berechnen ────────────────────────────────
        // Elternteil → Liste der Kinder
        var childrenOf = {};
        relationships.forEach(function(r) {
            if (!personIds.has(r.person_id) || !personIds.has(r.related_person_id)) return;
            if (r.relationship_type === 'hasMother' || r.relationship_type === 'hasFather') {
                var parentId = r.related_person_id;
                var childId  = r.person_id;
                if (!childrenOf[parentId]) childrenOf[parentId] = [];
                childrenOf[parentId].push(childId);
            }
        });

        // Geschwister-Paare ermitteln (jedes Paar nur einmal)
        var siblingPairs = new Set();
        Object.values(childrenOf).forEach(function(children) {
            for (var i = 0; i < children.length; i++) {
                for (var j = i + 1; j < children.length; j++) {
                    var a = Math.min(children[i], children[j]);
                    var b = Math.max(children[i], children[j]);
                    siblingPairs.add(a + '_' + b);
                }
            }
        });

        siblingPairs.forEach(function(pair) {
            var parts = pair.split('_');
            var idA = Number(parts[0]);
            var idB = Number(parts[1]);
            if (!personIds.has(idA) || !personIds.has(idB)) return;
            elements.push({ group: 'edges', data: {
                id: 'sib_' + pair,
                source: idA,
                target: idB,
                type: 'sibling',
                label: 'Geschwister',
            }});
        });

        return elements;
    }

    // ── Zeitachsen-Layout ─────────────────────────────────────────
    // Schritt 1: cose läuft normal
    // Schritt 2: Y-Koordinaten werden durch Geburtsjahr ersetzt
    // Schritt 3: X-Koordinaten bleiben wie cose sie berechnet hat
    function applyTimelineLayout() {
        // Geburtsjahr-Grenzen aus aktuellen Knoten
        var years = cy.nodes().map(function(n) { return n.data('birthYear'); })
                              .filter(function(y) { return y; });
        TL_MIN_YEAR = Math.min.apply(null, years);
        TL_MAX_YEAR = Math.max.apply(null, years);
        TL_PADDING  = 80;
        var avgYear = Math.round(years.reduce(function(a,b){return a+b;},0) / years.length);

        cy.nodes().forEach(function(node) {
            var year = node.data('birthYear') || avgYear;
            // Jung oben (kleine Y), Alt unten (große Y)
            var y = TL_PADDING + (TL_MAX_YEAR - year) * PX_PER_YEAR;
            node.position('y', y);
        });

        // ── Horizontale Überlappungen auflösen ──────────────────
        // Knoten auf gleicher Y-Ebene (±30px) horizontal auseinanderschieben
        var nodeList = cy.nodes().toArray();
        var iterations = 50;
        var minGap = 110;   // Mindestabstand horizontal (Knotenbreite 100 + 10px Luft)

        for (var iter = 0; iter < iterations; iter++) {
            var moved = false;
            for (var i = 0; i < nodeList.length; i++) {
                for (var j = i + 1; j < nodeList.length; j++) {
                    var ni = nodeList[i];
                    var nj = nodeList[j];
                    var dy = Math.abs(ni.position('y') - nj.position('y'));
                    if (dy > 60) continue;   // nicht auf gleicher Ebene

                    var dx = nj.position('x') - ni.position('x');
                    var dist = Math.abs(dx);
                    if (dist < minGap) {
                        var push = (minGap - dist) / 2 + 1;
                        if (dx >= 0) {
                            ni.position('x', ni.position('x') - push);
                            nj.position('x', nj.position('x') + push);
                        } else {
                            ni.position('x', ni.position('x') + push);
                            nj.position('x', nj.position('x') - push);
                        }
                        moved = true;
                    }
                }
            }
            if (!moved) break;
        }

        cy.fit(60);
        updateTimeline();
    }

    // ── Zeitachsen-Beschriftung + horizontale Linien (SVG) ─────
    function updateTimeline() {
        var tlDiv  = document.getElementById('timeline');
        var svg    = document.getElementById('tl-svg');

        // Leeren
        tlDiv.innerHTML = '';
        while (svg.firstChild) svg.removeChild(svg.firstChild);

        if (!cy || cy.nodes().length === 0) return;

        var minYear     = TL_MIN_YEAR;
        var maxYear     = TL_MAX_YEAR;
        var step        = 25;
        var startDecade = Math.floor(minYear / step) * step;
        var endDecade   = Math.ceil(maxYear  / step) * step;

        var svgW = svg.clientWidth  || svg.parentElement.clientWidth  || 800;
        var svgH = svg.clientHeight || svg.parentElement.clientHeight || 600;

        // SVG viewBox setzen
        svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);

        for (var yr = startDecade; yr <= endDecade; yr += step) {
            var gY = TL_PADDING + (maxYear - yr) * PX_PER_YEAR;
            var sY = cy.pan().y + gY * cy.zoom();

            // ── Linie links in Timeline-Leiste ───────────────────
            var tlLine = document.createElement('div');
            tlLine.className = 'tl-line';
            tlLine.style.top = sY + 'px';
            tlDiv.appendChild(tlLine);

            var tlLabel = document.createElement('div');
            tlLabel.className   = 'tl-label';
            tlLabel.style.top   = sY + 'px';
            tlLabel.textContent = yr;
            tlDiv.appendChild(tlLabel);

            // ── Horizontale SVG-Linie quer durch den Graph ───────
            var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', '0');
            line.setAttribute('x2', svgW);
            line.setAttribute('y1', sY);
            line.setAttribute('y2', sY);
            line.setAttribute('stroke', '#b8b8b8');
            line.setAttribute('stroke-width', '1');
            svg.appendChild(line);
        }
    }


    function runLayout(name) {
        if (!cy || cy.nodes().length === 0) return;

        // Zeitachse ein/ausblenden
        var tlDiv = document.getElementById('timeline');
        tlDiv.style.display = (name === 'timeline') ? 'block' : 'none';
        if (name !== 'timeline') {
            tlDiv.innerHTML = '';
            var svg = document.getElementById('tl-svg');
            if (svg) { while (svg.firstChild) svg.removeChild(svg.firstChild); }
        }

        cy.style()
            .selector('edge[type = "hasMother"]').style({
                'display': showParent  ? 'element' : 'none',
                'label':   showParent  ? 'data(label)' : '',
            })
            .selector('edge[type = "hasFather"]').style({
                'display': showParent  ? 'element' : 'none',
                'label':   showParent  ? 'data(label)' : '',
            })
            .selector('edge[type = "hasWife"]').style({
                'display': showMarried ? 'element' : 'none',
                'label':   showMarried ? 'data(label)' : '',
            })
            .selector('edge[type = "sibling"]').style({
                'display': showSiblings ? 'element' : 'none',
                'label':   showSiblings ? 'data(label)' : '',
            })
            .update();

        if (name === 'timeline') {
            // Im Timeline-Layout alle Knoten gleich groß setzen
            cy.nodes().forEach(function(n) {
                n.style({ 'width': 100, 'height': 50 });
            });

            // Erst cose laufen lassen für X-Positionen
            var coseConfig = {
                name: 'cose',
                animate: false,
                fit: false,
                padding: 40,
                idealEdgeLength: 100,
                nodeRepulsion: repulsionValue,
                nodeOverlap: 20,        // Überlappungen aktiv verhindern
                gravity: 80,
                numIter: 1500,
                initialTemp: 200,
                coolingFactor: 0.95,
                minTemp: 1.0,
                randomize: true,
            };
            var layout = cy.layout(coseConfig);
            layout.on('layoutstop', function() {
                // Y-Koordinaten durch Geburtsjahr ersetzen
                applyTimelineLayout();
            });
            layout.run();
            return;
        }

        var config;
        switch(name) {
            case 'cose':
                config = {
                    name: 'cose', animate: true, animationDuration: 600,
                    refresh: 20, fit: true, padding: 40,
                    idealEdgeLength: 100, nodeRepulsion: repulsionValue,
                    nodeOverlap: 20,        // Überlappungen aktiv verhindern
                    gravity: 80,
                    numIter: 1500, initialTemp: 200, coolingFactor: 0.95,
                    minTemp: 1.0, randomize: true,
                };
                break;
            case 'klay':
                config = {
                    name: 'klay', animate: false,
                    klay: {
                        direction: 'DOWN', nodePlacement: 'BRANDES_KOEPF',
                        edgeRouting: 'SPLINES', spacing: 60, thoroughness: 7,
                        fixedAlignment: 'NONE', separateConnectedComponents: true,
                        inLayerSpacingFactor: 2.0,
                    },
                };
                break;
            case 'dagre':
                config = { name: 'dagre', rankDir: 'TB', nodeSep: 40, rankSep: 80, padding: 30 };
                break;
            case 'breadthfirst':
                config = { name: 'breadthfirst', directed: true, spacingFactor: 1.2, padding: 20 };
                break;
            default:
                config = { name: name, animate: true, animationDuration: 600 };
        }

        var layout = cy.layout(config);
        layout.on('layoutstop', function() {
            cy.nodes().forEach(function(n) {
                n.style({ 'width': n.data('nodeW'), 'height': n.data('nodeH') });
            });
            cy.fit(40);
        });
        layout.run();
    }

    function buildLegend(persons) {
        var families = {};
        persons.forEach(function(p) { if (p.family_name) families[p.family_name] = true; });

        // Nach Farbton (Hue) sortieren → durchgehendes Spektrum
        function hexToHue(hex) {
            var r = parseInt(hex.slice(1,3),16)/255;
            var g = parseInt(hex.slice(3,5),16)/255;
            var b = parseInt(hex.slice(5,7),16)/255;
            var max = Math.max(r,g,b), min = Math.min(r,g,b), h = 0;
            var d = max - min;
            if (d === 0) return 0;
            if (max === r) h = ((g-b)/d + (g<b?6:0)) / 6;
            else if (max === g) h = ((b-r)/d + 2) / 6;
            else h = ((r-g)/d + 4) / 6;
            return h;
        }

        // Sortierung nach Reihenfolge im FAMILY_COLORS Objekt (bereits als Spektrum definiert)
        var spectrumOrder = Object.keys(FAMILY_COLORS);
        var sorted = Object.keys(families).sort(function(a, b) {
            var ia = spectrumOrder.indexOf(a);
            var ib = spectrumOrder.indexOf(b);
            // Unbekannte Familiennamen ans Ende
            if (ia < 0) return 1;
            if (ib < 0) return -1;
            return ia - ib;
        });

        var container = document.getElementById('legend-items');
        container.innerHTML = '';
        sorted.forEach(function(name) {
            var item = document.createElement('div');
            item.className = 'legend-item';
            item.innerHTML = '<div class="legend-dot" style="background:' + getFamilyColor(name) + '"></div><span>' + name + '</span>';
            item.addEventListener('click', function() {
                document.getElementById('filter-name').value = name;
                applyFilter(allPersons.filter(function(p) { return p.family_name === name; }), allRels);
            });
            container.appendChild(item);
        });
    }

    document.getElementById('filter-name').addEventListener('input', function() {
        var q = this.value.trim().toLowerCase();
        if (!q) {
            applyFilter(allPersons, allRels);
            return;
        }

        // Direkt passende Personen
        var directMatches = allPersons.filter(function(p) {
            return p.family_name.toLowerCase().includes(q) ||
                   p.display_name.toLowerCase().includes(q);
        });

        // IDs der direkt passenden Personen
        var directIds = new Set(directMatches.map(function(p) { return p.id; }));

        // Eine Ebene weiter: alle Personen die mit den direkten Treffern verbunden sind
        var neighbourIds = new Set();
        allRels.forEach(function(r) {
            if (directIds.has(r.person_id))         neighbourIds.add(r.related_person_id);
            if (directIds.has(r.related_person_id)) neighbourIds.add(r.person_id);
        });

        // Nachbarn die nicht schon in directIds sind
        var neighbours = allPersons.filter(function(p) {
            return neighbourIds.has(p.id) && !directIds.has(p.id);
        });

        // Zusammenführen: direkte Treffer + Nachbarn
        var filtered = directMatches.concat(neighbours);
        applyFilter(filtered, allRels);
    });

    document.getElementById('reset-filter').addEventListener('click', function() {
        document.getElementById('filter-name').value = '';
        applyFilter(allPersons, allRels);
    });

    document.getElementById('apply-layout').addEventListener('click', function() {
        runLayout(document.getElementById('layout-select').value);
    });

    function formatDate(d) {
        if (!d) return '';
        var parts = d.split('T')[0].split('-');
        return parts.length === 3 ? parts[2]+'.'+parts[1]+'.'+parts[0] : d;
    }

    // ── Pfadsuche ─────────────────────────────────────────────────

    // Panel öffnen/schließen
    document.getElementById('path-toggle').addEventListener('click', function() {
        var panel = document.getElementById('path-panel');
        panel.classList.toggle('open');

    // Dropdowns befüllen wenn Daten geladen sind
    function fillPathDropdowns() {
        var selA = document.getElementById('path-person-a');
        var selB = document.getElementById('path-person-b');

        while (selA.options.length > 1) selA.remove(1);
        while (selB.options.length > 1) selB.remove(1);

        var sorted = allPersons.slice().sort(function(a, b) {

            var optB = document.createElement('option');
            optB.value = p.id;
            optB.textContent = p.display_name;

        });
    }

    // Alle Pfade zwischen zwei Knoten per BFS finden
    // Wichtig: Cytoscape gibt IDs immer als Strings zurück – alles als String vergleichen
    function findAllPaths(startId, endId, maxSteps) {
        var start = String(startId);
        var end   = String(endId);
        var allPaths = [];

        // Prüfen ob Startknoten im Graph existiert
        if (cy.getElementById(start).length === 0) {
            console.warn('Startknoten nicht gefunden:', start);
            return allPaths;
        }
        if (cy.getElementById(end).length === 0) {
            console.warn('Endknoten nicht gefunden:', end);
            return allPaths;
        }

        var queue = [{ nodeId: start, nodePath: [start], edgePath: [] }];

        while (queue.length > 0) {
            var current = queue.shift();

            // Ziel erreicht?
            if (current.nodeId === end && current.nodePath.length > 1) {
                allPaths.push({ nodes: current.nodePath, edges: current.edgePath });
                continue;
            }

            // Max-Tiefe erreicht oder Ziel als Zwischenstopp überspringen
            if (current.nodePath.length > maxSteps + 1) continue;
            if (current.nodeId === end) continue;

            // Nachbarn durchsuchen (ungerichtet)
            var node = cy.getElementById(current.nodeId);
            node.connectedEdges().forEach(function(edge) {
                // IDs immer als String
                var srcId = String(edge.source().id());
                var tgtId = String(edge.target().id());
                var otherId = srcId === current.nodeId ? tgtId : srcId;

                // Zyklen vermeiden
                if (current.nodePath.indexOf(otherId) !== -1) return;

                queue.push({
                    nodeId:   otherId,
                    nodePath: current.nodePath.concat([otherId]),
                    edgePath: current.edgePath.concat([String(edge.id())]),
                });
            });
        }
        return allPaths;
    }

    // Suche starten
    document.getElementById('path-search-btn').addEventListener('click', function() {
        var idA      = String(document.getElementById('path-person-a').value);
        var idB      = String(document.getElementById('path-person-b').value);
        var maxSteps = Number(document.getElementById('path-max-steps').value);
        var result   = document.getElementById('path-result');

        if (!idA || !idB) {
            result.textContent = '⚠️ Bitte beide Personen wählen.';
            return;
        }
        if (idA === idB) {
            result.textContent = '⚠️ Bitte zwei verschiedene Personen wählen.';
            return;
        }

        result.textContent = '⏳ Suche läuft...';

        // Kurze Verzögerung damit UI aktualisiert
        setTimeout(function() {
            var paths = findAllPaths(idA, idB, maxSteps);

            if (paths.length === 0) {
                cy.elements().removeClass('faded');
                result.textContent = '❌ Keine Verbindung gefunden (max. ' + maxSteps + ' Schritte).';
                return;
            }

            // Alle beteiligten Knoten und Kanten sammeln
            var highlightNodes = new Set();
            var highlightEdges = new Set();
            paths.forEach(function(p) {
                p.nodes.forEach(function(nId) { highlightNodes.add(String(nId)); });
                p.edges.forEach(function(eId) { highlightEdges.add(eId); });
            });

            // Alles ausblenden, Pfade highlighten
            cy.elements().addClass('faded');
            highlightNodes.forEach(function(nId) {
                cy.getElementById(nId).removeClass('faded');
            });
            highlightEdges.forEach(function(eId) {
                cy.getElementById(eId).removeClass('faded');
            });

            // Start- und Zielknoten extra hervorheben
            cy.getElementById(String(idA)).style({ 'border-color': '#e74c3c', 'border-width': '5px' });
            cy.getElementById(String(idB)).style({ 'border-color': '#e74c3c', 'border-width': '5px' });

            // Kürze­sten Pfad berechnen
            var shortest = paths.reduce(function(a, b) {
                return a.nodes.length < b.nodes.length ? a : b;
            });

            result.textContent = '✅ ' + paths.length + ' Pfad' +
                (paths.length > 1 ? 'e' : '') + ' gefunden · kürzester: ' +
                (shortest.nodes.length - 1) + ' Schritt' +
                (shortest.nodes.length - 1 !== 1 ? 'e' : '');

            // Graph auf Pfad fokussieren
            var pathEls = cy.collection();
            highlightNodes.forEach(function(nId) { pathEls = pathEls.union(cy.getElementById(nId)); });
            highlightEdges.forEach(function(eId) { pathEls = pathEls.union(cy.getElementById(eId)); });
            cy.fit(pathEls, 80);

        }, 50);
    });

    // Zurücksetzen
    document.getElementById('path-reset-btn').addEventListener('click', function() {
        cy.elements().removeClass('faded');
        // Knotenränder zurücksetzen
        cy.nodes().forEach(function(n) {
            n.removeStyle('border-color');
            n.removeStyle('border-width');
        });
        document.getElementById('path-result').textContent = '';
    });

});
