<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stammbaum – Bahrs Familie</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Georgia, serif;
            background: #fdf8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #5a3e2b;
            color: white;
            padding: 0.8em 2em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        header h1 { font-size: 1.2em; }
        #logout-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 0.4em 1em;
            border-radius: 5px;
            cursor: pointer;
            font-family: Georgia, serif;
        }
        #logout-btn:hover { background: rgba(255,255,255,0.3); }
        #toolbar {
            background: #f0e8dc;
            border-bottom: 1px solid #ddd;
            padding: 0.6em 1.5em;
            display: flex;
            align-items: center;
            gap: 1em;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        #toolbar label { font-size: 0.9em; color: #5a3e2b; }
        #filter-name {
            padding: 0.4em 0.8em;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.9em;
            font-family: Georgia, serif;
            width: 200px;
        }
        #layout-select {
            padding: 0.4em 0.8em;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.9em;
            font-family: Georgia, serif;
        }
        .tool-btn {
            padding: 0.4em 0.9em;
            background: #5a3e2b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            font-family: Georgia, serif;
        }
        .tool-btn:hover { background: #7a5e4b; }
        #person-count { font-size: 0.85em; color: #888; margin-left: auto; }
        #cy { flex: 1; width: 100%; min-height: 500px; }

        #legend {
            position: fixed;
            bottom: 20px; left: 20px;
            background: rgba(255,255,255,0.95);
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 0.7em 1em;
            font-size: 0.75em;
            z-index: 100;
            max-height: 55vh;
            overflow-y: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-width: 160px;
        }
        #legend h4 {
            color: #5a3e2b; margin-bottom: 0.5em; font-size: 0.9em;
            border-bottom: 1px solid #eee; padding-bottom: 0.3em;
        }
        .legend-item {
            display: flex; align-items: center; margin-bottom: 0.3em;
            gap: 0.5em; cursor: pointer; padding: 0.1em 0.2em; border-radius: 3px;
        }
        .legend-item:hover { background: #f0e8dc; }
        .legend-dot {
            width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
            border: 1px solid rgba(0,0,0,0.2);
        }
        .legend-hint { font-size: 0.8em; color: #aaa; margin-top: 0.5em; font-style: italic; }

        #info-panel {
            display: none;
            position: fixed; top: 80px; right: 20px;
            width: 280px; background: white; border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 1.2em; z-index: 1000; font-size: 0.9em;
        }
        #info-panel h2 {
            font-size: 1.1em; color: #3a2a1a; margin-bottom: 0.8em;
            border-bottom: 1px solid #eee; padding-bottom: 0.5em;
        }
        #info-panel .field { margin-bottom: 0.4em; color: #555; }
        #info-panel .field span { color: #222; font-weight: bold; }
        #info-close {
            position: absolute; top: 0.6em; right: 0.8em;
            cursor: pointer; font-size: 1.2em; color: #aaa;
            background: none; border: none;
        }
        #info-close:hover { color: #333; }
        #status-bar { text-align: center; padding: 2em; color: #5a3e2b; font-size: 1.1em; }
    </style>
</head>
<body>

<header>
    <h1>🌳 Bahrs Familienstammbaum</h1>
    <nav style="display:flex; gap:1em; align-items:center;">
        <a href="stammbaum3d.html"
           style="color:rgba(255,255,255,0.85); font-size:0.9em; text-decoration:none;">
           🌐 3D-Ansicht
        </a>
        <a href="eingabe.html"
           style="color:rgba(255,255,255,0.85); font-size:0.9em; text-decoration:none;">
           ✏️ Eintrag hinzufügen
        </a>
        <button id="logout-btn">Ausloggen</button>
    </nav>
</header>

<div id="toolbar">
    <label>🔍 Filter:</label>
    <input type="text" id="filter-name" placeholder="Familienname..." />
    <label>Layout:</label>
    <select id="layout-select">
        <option value="cose">Organisch</option>
        <option value="klay">Stammbaum (klay)</option>
        <option value="dagre">Hierarchisch (dagre)</option>
        <option value="breadthfirst">Breitensuche</option>
        <option value="circle">Kreis</option>
        <option value="grid">Raster</option>
    </select>
    <button class="tool-btn" id="apply-layout">Neu anordnen</button>
    <button class="tool-btn" id="reset-filter">Alle zeigen</button>
    <label style="font-size:0.85em; display:flex; align-items:center; gap:4px;">
        <input type="checkbox" id="show-labels" checked style="width:auto;">
        Beziehungslabels
    </label>
    <span id="person-count"></span>
</div>

<div id="status-bar">Lade Stammbaum...</div>
<div id="cy"></div>

<div id="legend">
    <h4>🎨 Familiennamen</h4>
    <div id="legend-items"></div>
    <div class="legend-hint">Klick → nur diese Familie</div>
</div>

<div id="info-panel">
    <button id="info-close">✕</button>
    <h2 id="info-name"></h2>
    <div class="field">Geschlecht: <span id="info-sex"></span></div>
    <div class="field">Geboren: <span id="info-birth"></span></div>
    <div class="field">Gestorben: <span id="info-death"></span></div>
    <div class="field">Geburtsort: <span id="info-birthplace"></span></div>
    <div class="field">Beruf: <span id="info-profession"></span></div>
    <div class="field">Mädchenname: <span id="info-maiden"></span></div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<script src="https://cdn.jsdelivr.net/npm/klayjs@0.4.1/klay.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-klay@3.1.4/cytoscape-klay.js"></script>

<script>
var FAMILY_COLORS = {
    'ALLERHOLZ': '#e29c9c', 'APPEL':     '#e2a99c', 'BAHRS':     '#e2b79c',
    'BERG':      '#e2c49c', 'DAVIDS':    '#e2d29c', 'DEPNER':    '#e2e09c',
    'FRANCK':    '#d7e29c', 'FRANSSEN':  '#c9e29c', 'GAVRIKOV':  '#bbe29c',
    'GAVRIKOVA': '#aee29c', 'GLASHOFF':  '#a0e29c', 'GROTH':     '#9ce2a5',
    'HEIDEMANN': '#9ce2b2', 'HEINRICHS': '#9ce2c0', 'KARSTENS':  '#9ce2cd',
    'KÜHL':      '#9ce2db', 'MARTENS':   '#9cdbe2', 'MEYER':     '#9ccde2',
    'MÖLLER':    '#9cc0e2', 'PETERS':    '#9cb2e2', 'RISCHE':    '#9ca5e2',
    'RÜHMANN':   '#a09ce2', 'RÜHTER':    '#ae9ce2', 'SCHMIDT':   '#bb9ce2',
    'SCHNAAK':   '#c99ce2', 'SCHUBERT':  '#d79ce2', 'STEINKAMP': '#e29ce0',
    'TEGTMEYER': '#e29cd2', 'UHLMANN':   '#e29cc4', 'ULMER':     '#e29cb7',
    'WIPPERMANN':'#e29ca9',
};
function getFamilyColor(n) { return FAMILY_COLORS[n] || '#cccccc'; }

// ── Feste Positionen ─────────────────────────────────────────────
// x: negativ = links, positiv = rechts  (Mittelpunkt = 0)
// y: negativ = oben,  positiv = unten   (Mittelpunkt = 0)
// Abstand zwischen den beiden: 150px (auf gleicher Höhe y = -500)
var FIXED_POSITIONS = {
    'MARTENS Simon':         { x: -650, y: -500 },
    'MARTENS Martha Johanna':{ x: -500, y: -500 },
};

window.addEventListener('load', function() {

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let cy         = null;
    let allPersons = [];
    let allRels    = [];
    let showLabels = true;

    client.auth.getSession().then(function(result) {
        if (!result.data.session) { window.location.href = 'login.html'; }
        else { loadData(); }
    });

    document.getElementById('logout-btn').addEventListener('click', function() {
        client.auth.signOut().then(function() { window.location.href = 'login.html'; });
    });

    function loadData() {
        Promise.all([
            client.from('persons').select('*').eq('status', 'approved'),
            client.from('relationships').select('*').eq('status', 'approved'),
        ]).then(function(results) {
            if (results[0].error || results[1].error) {
                document.getElementById('status-bar').textContent = 'Fehler beim Laden.';
                return;
            }
            allPersons = results[0].data.map(function(p) { p.id = Number(p.id); return p; });
            allRels    = results[1].data.map(function(r) {
                r.id = Number(r.id);
                r.person_id = Number(r.person_id);
                r.related_person_id = Number(r.related_person_id);
                return r;
            });
            document.getElementById('status-bar').style.display = 'none';
            buildLegend(allPersons);
            initCy();
            applyFilter(allPersons, allRels);
        });
    }

    function initCy() {
        cy = cytoscape({
            container: document.getElementById('cy'),
            elements:  [],
            style: [
                {
                    selector: 'node',
                    style: {
                        'label':            'data(label)',
                        'font-size':        '9px',
                        'font-family':      'Georgia, serif',
                        'text-valign':      'center',
                        'text-halign':      'center',
                        'text-wrap':        'wrap',
                        'text-max-width':   '80px',
                        'width':            'data(radius)',
                        'height':           'data(radius)',
                        'shape':            'ellipse',
                        'background-color': 'data(famColor)',
                        'border-width':     '2px',
                        'border-color':     '#555',
                        'color':            '#1a1a2e',
                    }
                },
                { selector: 'node[sex = "f"]', style: { 'border-style': 'dashed' } },
                { selector: 'node[sex = "m"]', style: { 'border-style': 'solid'  } },
                // Verheiratete Person: goldene Umrandung
                {
                    selector: 'node.married',
                    style: {
                        'border-color': '#c8960c',
                        'border-width': '4px',
                    }
                },
                // Fixierte Person: zusätzlich mit Pin-Symbol angedeutet
                {
                    selector: 'node.fixed',
                    style: {
                        'border-color': '#c8960c',
                        'border-width': '4px',
                        'border-style': 'double',
                    }
                },
                { selector: 'node:selected', style: { 'border-width': '5px', 'border-color': '#5a3e2b' } },
                {
                    selector: 'edge',
                    style: {
                        'width': 1.5, 'line-color': '#aaa',
                        'target-arrow-color': '#aaa', 'target-arrow-shape': 'triangle',
                        'curve-style': 'bezier',
                        'font-size': '7px', 'font-family': 'Georgia, serif',
                        'text-rotation': 'autorotate', 'text-margin-y': '-8px',
                        'color': '#555', 'label': '',
                    }
                },
                { selector: 'edge[type = "hasMother"]', style: { 'line-color': '#c0607a', 'target-arrow-color': '#c0607a', 'color': '#c0607a' } },
                { selector: 'edge[type = "hasFather"]', style: { 'line-color': '#5a8ab0', 'target-arrow-color': '#5a8ab0', 'color': '#5a8ab0' } },
                // Ehe: goldfarben, dick, durchgezogen
                {
                    selector: 'edge[type = "hasWife"]',
                    style: {
                        'line-color':         '#c8960c',
                        'target-arrow-shape': 'none',
                        'line-style':         'solid',
                        'width':              6,
                        'opacity':            0.85,
                        'color':              '#c8960c',
                    }
                },
                { selector: '.faded', style: { 'opacity': 0.1 } }
            ],
        });

        cy.on('tap', 'node', function(e) {
            var node = e.target, d = node.data();
            document.getElementById('info-name').textContent       = d.label;
            document.getElementById('info-sex').textContent        = d.sex === 'm' ? 'männlich' : d.sex === 'f' ? 'weiblich' : '–';
            document.getElementById('info-birth').textContent      = formatDate(d.birth_date)  || '–';
            document.getElementById('info-death').textContent      = formatDate(d.death_date)  || '–';
            document.getElementById('info-birthplace').textContent = d.birth_place  || '–';
            document.getElementById('info-profession').textContent = d.profession   || '–';
            document.getElementById('info-maiden').textContent     = d.maiden_name  || '–';
            document.getElementById('info-panel').style.display    = 'block';
            cy.elements().addClass('faded');
            node.removeClass('faded');
            node.connectedEdges().removeClass('faded');
            node.connectedEdges().connectedNodes().removeClass('faded');
        });
        cy.on('tap', function(e) {
            if (e.target === cy) {
                cy.elements().removeClass('faded');
                document.getElementById('info-panel').style.display = 'none';
            }
        });
        document.getElementById('info-close').addEventListener('click', function() {
            cy.elements().removeClass('faded');
            document.getElementById('info-panel').style.display = 'none';
        });
    }

    function applyFilter(persons, relationships) {
        cy.elements().remove();
        cy.add(buildElements(persons, relationships));
        updateCount(persons.length);
        runLayout(document.getElementById('layout-select').value);
    }

    function buildElements(persons, relationships) {
        var birthYears = persons
            .map(function(p) { return p.birth_date ? parseInt(p.birth_date.substring(0,4)) : null; })
            .filter(function(y) { return y !== null; });
        var minYear = birthYears.length ? Math.min.apply(null, birthYears) : 1660;
        var maxYear = birthYears.length ? Math.max.apply(null, birthYears) : 2025;
        var avgYear = birthYears.length ? Math.round(
            birthYears.reduce(function(a,b){return a+b;},0) / birthYears.length) : 1850;

        function calcRadius(birth_date) {
            var year  = birth_date ? parseInt(birth_date.substring(0,4)) : avgYear;
            var ratio = (maxYear - minYear) > 0 ? (maxYear - year) / (maxYear - minYear) : 0.5;
            return Math.round(20 + ratio * 80);
        }

        // Verheiratete IDs für goldene Umrandung
        var personIds = new Set(persons.map(function(p) { return p.id; }));
        var marriedIds = new Set();
        relationships.forEach(function(r) {
            if ((r.relationship_type === 'hasWife' || r.relationship_type === 'hasHusband') &&
                personIds.has(r.person_id) && personIds.has(r.related_person_id)) {
                marriedIds.add(r.person_id);
                marriedIds.add(r.related_person_id);
            }
        });

        var elements = [];
        persons.forEach(function(p) {
            var r        = calcRadius(p.birth_date);
            var fixedPos = FIXED_POSITIONS[p.display_name] || null;

            // Klassen zusammenstellen
            var classes = [];
            if (marriedIds.has(p.id)) classes.push('married');
            if (fixedPos)             classes.push('fixed');

            var node = {
                group:   'nodes',
                data: {
                    id:          p.id,
                    label:       p.display_name,
                    sex:         p.sex,
                    family_name: p.family_name,
                    birth_date:  p.birth_date  || '',
                    death_date:  p.death_date  || '',
                    birth_place: p.birth_place || '',
                    profession:  p.profession  || '',
                    maiden_name: p.maiden_name || '',
                    radius:      r,
                    famColor:    getFamilyColor(p.family_name),
                },
                classes: classes.join(' '),
            };

            // Feste Position nur setzen wenn definiert
            if (fixedPos) {
                node.position = { x: fixedPos.x, y: fixedPos.y };
            }

            elements.push(node);
        });

        relationships.forEach(function(r) {
            if (!personIds.has(r.person_id) || !personIds.has(r.related_person_id)) return;
            if (r.relationship_type === 'hasMother' || r.relationship_type === 'hasFather') {
                elements.push({ group: 'edges', data: {
                    id: 'e'+r.id, source: r.related_person_id, target: r.person_id,
                    type: r.relationship_type,
                    label: r.relationship_type === 'hasMother' ? '👩 Mutter' : '👨 Vater',
                }});
            }
            if (r.relationship_type === 'hasWife') {
                elements.push({ group: 'edges', data: {
                    id: 'e'+r.id, source: r.person_id, target: r.related_person_id,
                    type: r.relationship_type, label: '💍 Ehepaar',
                }});
            }
        });
        return elements;
    }

    function runLayout(name) {
        if (!cy || cy.nodes().length === 0) return;

        var lv = showLabels ? 'data(label)' : '';
        cy.style()
            .selector('edge[type = "hasMother"]').style('label', lv)
            .selector('edge[type = "hasFather"]').style('label', lv)
            .selector('edge[type = "hasWife"]').style('label',   lv)
            .update();

        // Fixierte Knoten vor dem Layout sperren
        cy.nodes('.fixed').lock();

        var config;
        switch(name) {
            case 'cose':
                config = {
                    name: 'cose',
                    animate: true,
                    animationDuration: 600,
                    refresh: 20,
                    fit: true,
                    padding: 40,
                    idealEdgeLength: 100,
                    nodeRepulsion: 400000,
                    gravity: 80,
                    numIter: 1000,
                    initialTemp: 200,
                    coolingFactor: 0.95,
                    minTemp: 1.0,
                    randomize: true,
                };
                break;
            case 'klay':
                config = {
                    name: 'klay', animate: false,
                    klay: {
                        direction: 'DOWN', nodePlacement: 'BRANDES_KOEPF',
                        edgeRouting: 'SPLINES', spacing: 60, thoroughness: 7,
                        fixedAlignment: 'NONE', separateConnectedComponents: true,
                        inLayerSpacingFactor: 2.0,
                    },
                };
                break;
            case 'dagre':
                config = { name: 'dagre', rankDir: 'TB', nodeSep: 40, rankSep: 80, padding: 30 };
                break;
            case 'breadthfirst':
                config = { name: 'breadthfirst', directed: true, spacingFactor: 1.2, padding: 20 };
                break;
            default:
                config = { name: name, animate: true, animationDuration: 600 };
        }

        var layout = cy.layout(config);
        layout.on('layoutstop', function() {
            // Nach Layout wieder verschiebbar – aber fixierte Knoten bleiben gesperrt
            cy.nodes(':not(.fixed)').unlock();
            cy.fit(40);
        });
        layout.run();
    }

    function buildLegend(persons) {
        var families = {};
        persons.forEach(function(p) { if (p.family_name) families[p.family_name] = true; });
        var container = document.getElementById('legend-items');
        container.innerHTML = '';
        Object.keys(families).sort().forEach(function(name) {
            var item = document.createElement('div');
            item.className = 'legend-item';
            item.innerHTML = '<div class="legend-dot" style="background:' + getFamilyColor(name) + '"></div><span>' + name + '</span>';
            item.addEventListener('click', function() {
                document.getElementById('filter-name').value = name;
                applyFilter(allPersons.filter(function(p) { return p.family_name === name; }), allRels);
            });
            container.appendChild(item);
        });
    }

    document.getElementById('filter-name').addEventListener('input', function() {
        var q = this.value.trim().toLowerCase();
        applyFilter(q ? allPersons.filter(function(p) {
            return p.family_name.toLowerCase().includes(q) || p.display_name.toLowerCase().includes(q);
        }) : allPersons, allRels);
    });

    document.getElementById('reset-filter').addEventListener('click', function() {
        document.getElementById('filter-name').value = '';
        applyFilter(allPersons, allRels);
    });

    document.getElementById('apply-layout').addEventListener('click', function() {
        runLayout(document.getElementById('layout-select').value);
    });

    document.getElementById('show-labels').addEventListener('change', function() {
        showLabels = this.checked;
        var lv = showLabels ? 'data(label)' : '';
        if (cy) cy.style()
            .selector('edge[type = "hasMother"]').style('label', lv)
            .selector('edge[type = "hasFather"]').style('label', lv)
            .selector('edge[type = "hasWife"]').style('label',   lv)
            .update();
    });

    function formatDate(d) {
        if (!d) return '';
        var parts = d.split('T')[0].split('-');
        return parts.length === 3 ? parts[2]+'.'+parts[1]+'.'+parts[0] : d;
    }
    function updateCount(n) {
        document.getElementById('person-count').textContent = n + ' Personen';
    }
});
</script>
</body>
</html>
