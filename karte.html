<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karte – Bahrs Familie</title>

    <!-- Leaflet CSS muss VOR allem anderen stehen -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: Georgia, serif;
            background: #fdf8f0;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        header {
            background: #5a3e2b;
            color: white;
            padding: 0.8em 2em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        header h1 { font-size: 1.2em; }
        #logout-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 0.4em 1em;
            border-radius: 5px;
            cursor: pointer;
            font-family: Georgia, serif;
        }
        #logout-btn:hover { background: rgba(255,255,255,0.3); }

        #toolbar {
            background: #f0e8dc;
            border-bottom: 1px solid #ddd;
            padding: 0.6em 1.5em;
            display: flex;
            align-items: center;
            gap: 1em;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        #toolbar label { font-size: 0.9em; color: #5a3e2b; }

        .tool-btn {
            padding: 0.4em 0.9em;
            background: #5a3e2b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            font-family: Georgia, serif;
        }
        .tool-btn:hover { background: #7a5e4b; }

        .toggle-btn {
            padding: 0.35em 0.8em;
            border: 1px solid #5a3e2b;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            font-family: Georgia, serif;
            background: white;
            color: #5a3e2b;
        }
        .toggle-btn.active { background: #5a3e2b; color: white; }

        #progress-wrap {
            display: none;
            align-items: center;
            gap: 0.6em;
            font-size: 0.85em;
            color: #5a3e2b;
        }
        #progress-wrap.visible { display: flex; }
        #progress-bar-outer {
            width: 150px; height: 8px;
            background: #ddd; border-radius: 4px; overflow: hidden;
        }
        #progress-bar-inner {
            height: 100%; background: #5a3e2b;
            border-radius: 4px; width: 0%; transition: width 0.2s;
        }

        #stats { font-size: 0.85em; color: #888; margin-left: auto; }

        /* Karte bekommt den ganzen restlichen Platz */
        #map {
            flex: 1;
            width: 100%;
            /* explizite Mindesthöhe damit Leaflet den Container sieht */
            min-height: 300px;
        }

        /* Legende */
        .map-legend {
            background: rgba(255,255,255,0.95);
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 0.8em 1.1em;
            font-size: 0.82em;
            font-family: Georgia, serif;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            line-height: 1.8em;
        }
        .map-legend h4 { color: #5a3e2b; margin-bottom: 0.3em; }
        .legend-row { display: flex; align-items: center; gap: 0.5em; }
        .legend-dot {
            width: 12px; height: 12px; border-radius: 50%;
            flex-shrink: 0; border: 2px solid rgba(0,0,0,0.25);
        }
        .line-tooltip {
            background: rgba(255,255,255,0.9);
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: Georgia, serif;
            font-size: 0.82em;
            color: #5a3e2b;
            padding: 2px 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }
    </style>
</head>

window.addEventListener('load', function() {

    var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Geocoding-Cache vorbelegen mit manuellen Einträgen
    var geoCache = {};
    Object.keys(manualCache).forEach(function(place) {
        geoCache[place] = manualCache[place];
    });

    var showBirth = true;
    var showDeath = true;
    var showLines = true;

    // ── Auth ─────────────────────────────────────────────────────
    client.auth.getSession().then(function(result) {
        if (!result.data.session) {
            window.location.href = 'login.html';
            return;
        }
        initMap();
    });

    document.getElementById('logout-btn').addEventListener('click', function() {
        client.auth.signOut().then(function() { window.location.href = 'login.html'; });
    });

    // ── Leaflet Karte ─────────────────────────────────────────────
    var map = null;
    var birthLayer = null;
    var deathLayer = null;
    var linesLayer = null;

    function initMap() {
        // Leaflet initialisieren
        map = L.map('map').setView([53.5, 10.0], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            maxZoom: 19,
        }).addTo(map);

        birthLayer = L.layerGroup().addTo(map);
        deathLayer = L.layerGroup().addTo(map);
        linesLayer = L.layerGroup().addTo(map);

        // Legende als Leaflet-Control
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function() {
            var div = L.DomUtil.create('div', 'map-legend');
            div.innerHTML =
                '<h4>Legende</h4>' +
                '<div class="legend-row"><div class="legend-dot" style="background:#3388ff"></div> Geburtsort</div>' +
                '<div class="legend-row"><div class="legend-dot" style="background:#e74c3c"></div> Sterbeort</div>' +
                '<div class="legend-row"><div class="legend-dot" style="background:#8e44ad"></div> Beides</div>';
            return div;
        };
        legend.addTo(map);

        // Karte ist fertig – Daten laden
        loadData();
    }

    // ── Daten laden ───────────────────────────────────────────────
    function loadData() {
        client.from('persons')
            .select('id, display_name, birth_date, death_date, birth_place, death_place, birth_date_estimated, death_date_estimated')
            .eq('status', 'approved')
            .then(function(result) {
                if (result.error) {
                    alert('Fehler beim Laden: ' + result.error.message);
                    return;
                }
                var persons = result.data;

                // Einzigartige Orte sammeln
                // trim() entfernt führende/nachfolgende Leerzeichen
                var placesSet = {};
                persons.forEach(function(p) {
                    if (p.birth_place) {
                        p.birth_place = p.birth_place.trim();
                        placesSet[p.birth_place] = true;
                    }
                    if (p.death_place) {
                        p.death_place = p.death_place.trim();
                        placesSet[p.death_place] = true;
                    }
                });
                var places = Object.keys(placesSet);

                geocodePlaces(places, persons);
            });
    }

    // ── Geocoding (Nominatim, 1 Anfrage/Sekunde) ──────────────────
    function geocodePlaces(places, persons) {
        var total    = places.length;
        var progWrap = document.getElementById('progress-wrap');
        var progText = document.getElementById('progress-text');
        var progBar  = document.getElementById('progress-bar-inner');

        if (total === 0) { renderMarkers(persons); return; }
        progWrap.classList.add('visible');

        function geocodeNext(index) {
            if (index >= places.length) {
                progWrap.classList.remove('visible');
                renderMarkers(persons);
                return;
            }

            var place = places[index];
            progText.textContent = place + ' (' + (index + 1) + '/' + total + ')';
            progBar.style.width  = Math.round((index + 1) / total * 100) + '%';

            // Bereits bekannt (manuell oder vorher geocoded)?
            if (geoCache.hasOwnProperty(place)) {
                setTimeout(function() { geocodeNext(index + 1); }, 0);
                return;
            }

            var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' +
                      encodeURIComponent(place);

            fetch(url, { headers: { 'Accept-Language': 'de' } })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data && data.length > 0) {
                        geoCache[place] = {
                            lat: parseFloat(data[0].lat),
                            lng: parseFloat(data[0].lon),
                        };
                    } else {
                        geoCache[place] = null;
                    }
                    // Rate-Limit: 1.1 Sekunden warten
                    setTimeout(function() { geocodeNext(index + 1); }, 1100);
                })
                .catch(function() {
                    geoCache[place] = null;
                    setTimeout(function() { geocodeNext(index + 1); }, 1100);
                });
        }

        geocodeNext(0);
    }

    // ── Marker setzen ─────────────────────────────────────────────
    function renderMarkers(persons) {
        birthLayer.clearLayers();
        deathLayer.clearLayers();

        // Pro Ort: Personen sammeln
        var byBirth = {};
        var byDeath = {};
        persons.forEach(function(p) {
            if (p.birth_place && geoCache[p.birth_place]) {
                if (!byBirth[p.birth_place]) byBirth[p.birth_place] = [];
                byBirth[p.birth_place].push(p);
            }
            if (p.death_place && geoCache[p.death_place]) {
                if (!byDeath[p.death_place]) byDeath[p.death_place] = [];
                byDeath[p.death_place].push(p);
            }
        });

        // Geburtsorte – blau
        Object.keys(byBirth).forEach(function(place) {
            var geo   = geoCache[place];
            var pList = byBirth[place];
            var r     = 7 + Math.min(pList.length * 2, 12);
            var m = L.circleMarker([geo.lat, geo.lng], {
                radius: r, color: '#1a5f9e', fillColor: '#3388ff',
                fillOpacity: 0.75, weight: 2,
            });
            m.bindPopup(buildPopup(place, pList, 'birth'));
            birthLayer.addLayer(m);
        });

        // Sterbeorte – rot (leicht versetzt wenn Ort auch Geburtsort)
        Object.keys(byDeath).forEach(function(place) {
            var geo      = geoCache[place];
            var pList    = byDeath[place];
            var isBoth   = byBirth[place] !== undefined;
            var r        = 7 + Math.min(pList.length * 2, 12);
            var m = L.circleMarker([geo.lat + (isBoth ? 0.004 : 0), geo.lng], {
                radius: r,
                color:       isBoth ? '#6c1e8f' : '#c0392b',
                fillColor:   isBoth ? '#8e44ad' : '#e74c3c',
                fillOpacity: 0.75, weight: 2,
            });
            m.bindPopup(buildPopup(place, pList, 'death'));
            deathLayer.addLayer(m);
        });

        // Lebenslinien: Geburtsort → Sterbeort pro Person
        linesLayer.clearLayers();
        persons.forEach(function(p) {
            if (!p.birth_place || !p.death_place) return;
            if (p.birth_place === p.death_place) return;  // gleicher Ort → keine Linie
            var geoB = geoCache[p.birth_place];
            var geoD = geoCache[p.death_place];
            if (!geoB || !geoD) return;

            var line = L.polyline(
                [[geoB.lat, geoB.lng], [geoD.lat, geoD.lng]],
                {
                    color:     '#5a3e2b',
                    weight:    1,
                    opacity:   0.35,
                    dashArray: '4 4',   // fein gestrichelt
                }
            );
            line.bindTooltip(p.display_name, { sticky: true, className: 'line-tooltip' });
            linesLayer.addLayer(line);
        });

        // Statistik
        var notFound = Object.keys(geoCache).filter(function(k) { return geoCache[k] === null; });
        var statsEl  = document.getElementById('stats');
        statsEl.textContent =
            Object.keys(byBirth).length + ' Geburtsorte · ' +
            Object.keys(byDeath).length + ' Sterbeorte' +
            (notFound.length > 0 ? ' · ' + notFound.length + ' nicht gefunden' : '');
        if (notFound.length > 0) {
            statsEl.title  = 'Nicht gefunden:\n' + notFound.join('\n');
            statsEl.style.cursor = 'help';
            statsEl.style.color  = '#c0392b';
        }

        fitAll();
    }

    // ── Popup-Inhalt ──────────────────────────────────────────────
    function buildPopup(place, persons, type) {
        var html = '<div style="font-family:Georgia,serif; max-width:220px;">';
        html += '<b style="color:#5a3e2b;">📍 ' + place + '</b><br>';
        html += '<span style="font-size:0.82em; color:#888;">' +
                (type === 'birth' ? '🔵 Geburtsort' : '🔴 Sterbeort') +
                ' · ' + persons.length + ' Person' + (persons.length > 1 ? 'en' : '') +
                '</span>';

        persons.slice(0, 8).forEach(function(p) {
            html += '<hr style="margin:0.3em 0; border-color:#eee;">';
            html += '<div style="font-size:0.88em;"><b>' + p.display_name + '</b><br>';
            var date = type === 'birth' ? p.birth_date : p.death_date;
            var est  = type === 'birth' ? p.birth_date_estimated : p.death_date_estimated;
            if (date) {
                html += (type === 'birth' ? '* ' : '† ') + formatDate(date);
                if (est) html += ' <span style="color:#c8960c">🔮</span>';
            }
            html += '</div>';
        });

        if (persons.length > 8) {
            html += '<div style="font-size:0.78em;color:#aaa;margin-top:0.3em;">… und ' +
                    (persons.length - 8) + ' weitere</div>';
        }
        html += '</div>';
        return html;
    }

    // ── Auf alle Marker einzoomen ─────────────────────────────────
    function fitAll() {
        var pts = [];
        birthLayer.eachLayer(function(l) { pts.push(l.getLatLng()); });
        deathLayer.eachLayer(function(l) { pts.push(l.getLatLng()); });
        if (pts.length > 0) {
            map.fitBounds(L.latLngBounds(pts), { padding: [40, 40] });
        }
    }

    document.getElementById('fit-btn').addEventListener('click', fitAll);

    // ── Layer ein-/ausblenden ─────────────────────────────────────
    document.getElementById('toggle-birth').addEventListener('click', function() {
        showBirth = !showBirth;
        this.classList.toggle('active', showBirth);
        if (showBirth) birthLayer.addTo(map);
        else map.removeLayer(birthLayer);
    });

    document.getElementById('toggle-death').addEventListener('click', function() {
        showDeath = !showDeath;
        this.classList.toggle('active', showDeath);
        if (showDeath) deathLayer.addTo(map);
        else map.removeLayer(deathLayer);
    });

    document.getElementById('toggle-lines').addEventListener('click', function() {
        showLines = !showLines;
        this.classList.toggle('active', showLines);
        if (showLines) linesLayer.addTo(map);
        else map.removeLayer(linesLayer);
    });

    // ── Datum formatieren ─────────────────────────────────────────
    function formatDate(d) {
        if (!d) return '';
        var parts = d.split('T')[0].split('-');
        return parts.length === 3 ? parts[2] + '.' + parts[1] + '.' + parts[0] : d;
    }

});
</script>
</body>
</html>
